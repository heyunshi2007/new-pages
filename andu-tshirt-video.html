<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>岸度短袖种草视频</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Noto Sans SC', sans-serif;
  overflow: hidden;
}

#video-container {
  position: relative;
  width: 375px;
  height: 667px;
  background: #000;
  overflow: hidden;
  border-radius: 20px;
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
}

/* Phone frame */
#video-container::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border: 3px solid #333;
  border-radius: 20px;
  z-index: 100;
  pointer-events: none;
}

/* Scenes */
.scene {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  opacity: 0;
  transition: opacity 0.5s ease;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}
.scene.active { opacity: 1; }

/* Scene 1: Hook */
#scene1 {
  background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0a1628 100%);
}
#scene1 .hook-text {
  font-size: 42px;
  font-weight: 900;
  color: #fff;
  text-align: center;
  line-height: 1.3;
  opacity: 0;
  transform: translateY(40px);
}
#scene1 .hook-text.show {
  opacity: 1;
  transform: translateY(0);
  transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
#scene1 .hook-highlight {
  color: #00d4ff;
  text-shadow: 0 0 30px rgba(0,212,255,0.5);
}
#scene1 .hook-sub {
  font-size: 18px;
  font-weight: 300;
  color: rgba(255,255,255,0.6);
  margin-top: 15px;
  opacity: 0;
  transform: translateY(20px);
}
#scene1 .hook-sub.show {
  opacity: 1;
  transform: translateY(0);
  transition: all 0.5s ease 0.3s;
}
#scene1 .pulse-ring {
  position: absolute;
  width: 200px; height: 200px;
  border: 2px solid rgba(0,212,255,0.3);
  border-radius: 50%;
  animation: pulseRing 2s ease-out infinite;
}
@keyframes pulseRing {
  0% { transform: scale(0.8); opacity: 1; }
  100% { transform: scale(2); opacity: 0; }
}

/* Scene 2: Brand intro */
#scene2 {
  background: linear-gradient(180deg, #0d1b2a 0%, #1b263b 100%);
}
.brand-logo {
  font-size: 56px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 8px;
  opacity: 0;
  transform: scale(0.5);
}
.brand-logo.show {
  opacity: 1;
  transform: scale(1);
  transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.brand-tagline {
  font-size: 16px;
  font-weight: 300;
  color: #00d4ff;
  letter-spacing: 12px;
  margin-top: 10px;
  opacity: 0;
}
.brand-tagline.show {
  opacity: 1;
  transition: opacity 0.6s ease 0.4s;
}
.brand-line {
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, #00d4ff, transparent);
  margin-top: 20px;
}
.brand-line.show {
  width: 180px;
  transition: width 0.8s ease 0.6s;
}

/* Scene 3: Product showcase */
#scene3 {
  background: linear-gradient(180deg, #f8f9fa 0%, #e9ecef 100%);
  padding: 40px 20px;
}
.product-img-wrapper {
  width: 280px;
  height: 380px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  opacity: 0;
  transform: translateY(60px) scale(0.9);
}
.product-img-wrapper.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.product-img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.product-name-tag {
  position: absolute;
  bottom: 60px;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  padding: 10px 24px;
  border-radius: 30px;
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transform: translateY(20px);
}
.product-name-tag.show {
  opacity: 1;
  transform: translateY(0);
  transition: all 0.5s ease 0.3s;
}

/* Scene 4: Features */
#scene4 {
  background: linear-gradient(135deg, #0a1628, #162447);
  padding: 30px 25px;
}
.feature-item {
  display: flex;
  align-items: center;
  gap: 15px;
  width: 100%;
  padding: 14px 18px;
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 12px;
  opacity: 0;
  transform: translateX(-30px);
}
.feature-item.show {
  opacity: 1;
  transform: translateX(0);
  transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
.feature-icon {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.feature-icon.breathable { background: linear-gradient(135deg, #00d4ff33, #00d4ff11); }
.feature-icon.quickdry { background: linear-gradient(135deg, #4ecdc433, #4ecdc411); }
.feature-icon.lightweight { background: linear-gradient(135deg, #ffe66d33, #ffe66d11); }
.feature-icon.comfort { background: linear-gradient(135deg, #ff6b6b33, #ff6b6b11); }
.feature-title {
  color: #fff;
  font-size: 15px;
  font-weight: 700;
}
.feature-desc {
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  margin-top: 2px;
}

/* Scene 5: Detail shot */
#scene5 {
  background: linear-gradient(180deg, #f8f9fa, #dee2e6);
  padding: 40px 20px;
}
.detail-img-wrapper {
  width: 300px;
  height: 400px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  opacity: 0;
  transform: scale(1.1);
}
.detail-img-wrapper.show {
  opacity: 1;
  transform: scale(1);
  transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.detail-img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.detail-label {
  position: absolute;
  top: 60px;
  right: 25px;
  background: #00d4ff;
  color: #0a1628;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  opacity: 0;
  transform: translateX(20px);
}
.detail-label.show {
  opacity: 1;
  transform: translateX(0);
  transition: all 0.5s ease 0.4s;
}
.detail-text {
  position: absolute;
  bottom: 80px;
  color: #333;
  font-size: 16px;
  font-weight: 700;
  text-align: center;
  opacity: 0;
}
.detail-text.show {
  opacity: 1;
  transition: opacity 0.5s ease 0.3s;
}

/* Scene 6: Lifestyle */
#scene6 {
  background: linear-gradient(180deg, #1a1a2e, #16213e);
  padding: 0;
}
.lifestyle-img-wrapper {
  width: 100%;
  height: 100%;
  position: relative;
}
.lifestyle-img-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transform: scale(1.2);
}
.lifestyle-img-wrapper img.show {
  opacity: 1;
  transform: scale(1);
  transition: all 1s ease;
}
.lifestyle-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 30px 25px 40px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
}
.lifestyle-text {
  color: #fff;
  font-size: 22px;
  font-weight: 700;
  opacity: 0;
  transform: translateY(20px);
}
.lifestyle-text.show {
  opacity: 1;
  transform: translateY(0);
  transition: all 0.6s ease;
}
.lifestyle-subtext {
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  margin-top: 8px;
  opacity: 0;
}
.lifestyle-subtext.show {
  opacity: 1;
  transition: opacity 0.5s ease 0.3s;
}

/* Scene 7: CTA */
#scene7 {
  background: linear-gradient(135deg, #0a1628, #1a2a4a, #0a1628);
}
.cta-title {
  font-size: 36px;
  font-weight: 900;
  color: #fff;
  text-align: center;
  opacity: 0;
  transform: scale(0.8);
}
.cta-title.show {
  opacity: 1;
  transform: scale(1);
  transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.cta-price {
  font-size: 48px;
  font-weight: 900;
  color: #ff4757;
  margin-top: 15px;
  opacity: 0;
}
.cta-price.show {
  opacity: 1;
  transition: opacity 0.5s ease 0.3s;
}
.cta-price-old {
  font-size: 18px;
  color: rgba(255,255,255,0.4);
  text-decoration: line-through;
  margin-left: 8px;
}
.cta-btn {
  margin-top: 30px;
  padding: 14px 50px;
  background: linear-gradient(135deg, #00d4ff, #0099cc);
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  opacity: 0;
  transform: translateY(20px);
  box-shadow: 0 8px 30px rgba(0,212,255,0.4);
}
.cta-btn.show {
  opacity: 1;
  transform: translateY(0);
  transition: all 0.5s ease 0.5s;
}
.cta-urgency {
  margin-top: 15px;
  font-size: 13px;
  color: #ff6b6b;
  font-weight: 500;
  opacity: 0;
}
.cta-urgency.show {
  opacity: 1;
  transition: opacity 0.5s ease 0.7s;
}
.cta-urgency .blink {
  animation: blink 1s ease infinite;
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Floating particles */
.particles {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}
.particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: rgba(0,212,255,0.3);
  border-radius: 50%;
  animation: floatUp 4s ease-in infinite;
}
@keyframes floatUp {
  0% { transform: translateY(100%) scale(0); opacity: 0; }
  20% { opacity: 1; }
  100% { transform: translateY(-100vh) scale(1); opacity: 0; }
}

/* Progress bar */
#progress-bar {
  position: absolute;
  top: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, #00d4ff, #4ecdc4);
  z-index: 200;
  transition: width 0.1s linear;
  border-radius: 0 2px 2px 0;
}

/* Controls */
#controls {
  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  gap: 12px;
}
#controls button {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
#controls button:hover {
  background: rgba(0,212,255,0.3);
  border-color: #00d4ff;
}

/* Scene counter */
#scene-counter {
  position: absolute;
  top: 12px;
  right: 15px;
  color: rgba(255,255,255,0.5);
  font-size: 12px;
  z-index: 200;
  font-weight: 500;
}

/* Music note animation */
.music-note {
  position: absolute;
  font-size: 16px;
  animation: musicFloat 2s ease-out forwards;
  pointer-events: none;
  z-index: 50;
}
@keyframes musicFloat {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(-80px) rotate(20deg); opacity: 0; }
}

/* Swipe hint */
.swipe-hint {
  position: absolute;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.4);
  font-size: 12px;
  z-index: 200;
  animation: swipeHint 2s ease infinite;
}
@keyframes swipeHint {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-8px); }
}
</style>
</head>
<body>

<div id="video-container">
  <div id="progress-bar"></div>

  <!-- Scene 1: Hook -->

<script>
// ============ VIDEO ENGINE ============
const TOTAL_DURATION = 30000; // 30 seconds total
const scenes = [
  { id: 'scene1', duration: 3000 },
  { id: 'scene2', duration: 2500 },
  { id: 'scene3', duration: 4000 },
  { id: 'scene4', duration: 6000 },
  { id: 'scene5', duration: 4000 },
  { id: 'scene6', duration: 5000 },
  { id: 'scene7', duration: 5500 },
];

let currentScene = 0;
let sceneElapsed = 0;
let isPlaying = false;
let lastTimestamp = 0;
let animFrameId = null;

// Create particles
function createParticles(containerId, count = 15) {
  const container = document.getElementById(containerId);
  if (!container) return;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 4 + 's';
    p.style.animationDuration = (3 + Math.random() * 3) + 's';
    p.style.width = (2 + Math.random() * 4) + 'px';
    p.style.height = p.style.width;
    container.appendChild(p);
  }
}
createParticles('particles1', 12);
createParticles('particles2', 8);
createParticles('particles4', 10);
createParticles('particles7', 15);

// Scene animations
function activateScene(idx) {
  // Hide all scenes
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));

  // Show current scene
  const scene = scenes[idx];
  const el = document.getElementById(scene.id);
  el.classList.add('active');

  // Trigger animations
  setTimeout(() => {
    switch(idx) {
      case 0: // Hook
        document.getElementById('hook1').classList.add('show');
        document.getElementById('hook1-sub').classList.add('show');
        break;
      case 1: // Brand
        document.getElementById('brand-logo').classList.add('show');
        document.getElementById('brand-tagline').classList.add('show');
        document.getElementById('brand-line').classList.add('show');
        break;
      case 2: // Product
        document.getElementById('product-img').classList.add('show');
        document.getElementById('product-tag').classList.add('show');
        break;
      case 3: // Features
        document.getElementById('feat-title').style.opacity = '1';
        document.getElementById('feat-title').style.transition = 'opacity 0.5s';
        setTimeout(() => document.getElementById('feat1').classList.add('show'), 200);
        setTimeout(() => document.getElementById('feat2').classList.add('show'), 600);
        setTimeout(() => document.getElementById('feat3').classList.add('show'), 1000);
        setTimeout(() => document.getElementById('feat4').classList.add('show'), 1400);
        break;
      case 4: // Detail
        document.getElementById('detail-img').classList.add('show');
        document.getElementById('detail-label').classList.add('show');
        document.getElementById('detail-text').classList.add('show');
        break;
      case 5: // Lifestyle
        document.getElementById('lifestyle-img').classList.add('show');
        setTimeout(() => document.getElementById('life-text').classList.add('show'), 500);
        setTimeout(() => document.getElementById('life-sub').classList.add('show'), 800);
        break;
      case 6: // CTA
        document.getElementById('cta-title').classList.add('show');
        document.getElementById('cta-price').classList.add('show');
        document.getElementById('cta-btn').classList.add('show');
        document.getElementById('cta-urgency').classList.add('show');
        break;
    }
  }, 100);

  // Update counter
  document.getElementById('scene-counter').textContent = `${idx + 1} / ${scenes.length}`;
}

function resetSceneAnimations(idx) {
  switch(idx) {
    case 0:
      document.getElementById('hook1').classList.remove('show');
      document.getElementById('hook1-sub').classList.remove('show');
      break;
    case 1:
      document.getElementById('brand-logo').classList.remove('show');
      document.getElementById('brand-tagline').classList.remove('show');
      const line = document.getElementById('brand-line');
      line.classList.remove('show');
      line.style.width = '0';
      break;
    case 2:
      document.getElementById('product-img').classList.remove('show');
      document.getElementById('product-tag').classList.remove('show');
      break;
    case 3:
      document.getElementById('feat-title').style.opacity = '0';
      ['feat1','feat2','feat3','feat4'].forEach(id => 
        document.getElementById(id).classList.remove('show'));
      break;
    case 4:
      document.getElementById('detail-img').classList.remove('show');
      document.getElementById('detail-label').classList.remove('show');
      document.getElementById('detail-text').classList.remove('show');
      break;
    case 5:
      document.getElementById('lifestyle-img').classList.remove('show');
      document.getElementById('life-text').classList.remove('show');
      document.getElementById('life-sub').classList.remove('show');
      break;
    case 6:
      document.getElementById('cta-title').classList.remove('show');
      document.getElementById('cta-price').classList.remove('show');
      document.getElementById('cta-btn').classList.remove('show');
      document.getElementById('cta-urgency').classList.remove('show');
      break;
  }
}

function gameLoop(timestamp) {
  if (!isPlaying) return;

  if (!lastTimestamp) lastTimestamp = timestamp;
  const delta = timestamp - lastTimestamp;
  lastTimestamp = timestamp;

  sceneElapsed += delta;

  // Update progress bar
  const totalElapsed = scenes.slice(0, currentScene).reduce((a, s) => a + s.duration, 0) + sceneElapsed;
  const progress = Math.min(totalElapsed / TOTAL_DURATION * 100, 100);
  document.getElementById('progress-bar').style.width = progress + '%';

  // Check if scene should advance
  if (sceneElapsed >= scenes[currentScene].duration) {
    sceneElapsed = 0;
    resetSceneAnimations(currentScene);
    currentScene++;

    if (currentScene >= scenes.length) {
      // Video ended
      isPlaying = false;
      document.getElementById('btn-play').textContent = '▶';
      document.getElementById('swipe-hint').textContent = '✅ 播放完毕 · 点击重播';
      return;
    }

    activateScene(currentScene);
  }

  animFrameId = requestAnimationFrame(gameLoop);
}

function play() {
  if (isPlaying) {
    // Pause
    isPlaying = false;
    document.getElementById('btn-play').textContent = '▶';
    document.getElementById('swipe-hint').textContent = '⏸ 已暂停';
    if (animFrameId) cancelAnimationFrame(animFrameId);
    return;
  }

  isPlaying = true;
  lastTimestamp = 0;
  document.getElementById('btn-play').textContent = '⏸';
  document.getElementById('swipe-hint').classList.add('hidden');
  animFrameId = requestAnimationFrame(gameLoop);
}

function restart() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  isPlaying = false;
  currentScene = 0;
  sceneElapsed = 0;
  lastTimestamp = 0;

  // Reset all scenes
  scenes.forEach((_, i) => resetSceneAnimations(i));
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  document.getElementById('progress-bar').style.width = '0%';

  // Start fresh
  activateScene(0);
  setTimeout(() => play(), 300);
}

// Controls
document.getElementById('btn-play').addEventListener('click', play);
document.getElementById('btn-restart').addEventListener('click', restart);

// Keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); play(); }
  if (e.code === 'KeyR') restart();
});

// Auto-play hint
document.getElementById('swipe-hint').addEventListener('click', play);

// Initialize first scene
activateScene(0);
</script>
</body>
</html>
